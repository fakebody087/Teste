<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo</title>
<style>
  :root {
    --bg-0: #0f0a1a;
    --bg-1: #1a1230;
    --panel: #201735;
    --panel-border: #34244f;
    --accent-1: #b24bf3;
    --accent-2: #ff4fa3;
    --accent-grad: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    --text-0: #f3eefc;
    --text-1: #b7a9d6;
    --text-2: #7c6d9c;
    --danger: #ff5c7a;
    --radius: 14px;
    --font-display: 'Fraunces', 'Georgia', serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-body);
    background: radial-gradient(ellipse at top left, var(--bg-1) 0%, var(--bg-0) 60%);
    color: var(--text-0);
    min-height: 100vh;
  }

  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: 100vh;
  }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
    .main { order: 1; }
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-1) 100%);
    border-right: 1px solid var(--panel-border);
    padding: 32px 26px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .brand {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.2px;
    background: var(--accent-grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .brand-sub {
    font-size: 12.5px;
    color: var(--text-2);
    margin-top: -14px;
    letter-spacing: 0.4px;
  }

  .field-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-2);
    margin-bottom: 6px;
    display: block;
  }

  input[type="text"], input[type="url"] {
    width: 100%;
    background: var(--bg-0);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 11px 13px;
    color: var(--text-0);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color .15s ease;
  }
  input[type="text"]:focus, input[type="url"]:focus {
    border-color: var(--accent-1);
  }

  .field { display: flex; flex-direction: column; }

  .upload-zone {
    border: 1.5px dashed var(--panel-border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
    position: relative;
    color: var(--text-2);
    font-size: 13px;
  }
  .upload-zone:hover { border-color: var(--accent-1); background: rgba(178,75,243,0.06); }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .upload-preview {
    width: 100%;
    max-height: 140px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 10px;
    display: none;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 16px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform .12s ease, opacity .12s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent-grad);
    color: #17101f;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--text-1);
  }
  .btn-ghost:hover { border-color: var(--accent-1); color: var(--text-0); }

  .form-actions { display: flex; gap: 10px; }
  .form-actions .btn { flex: 1; }

  .status-msg {
    font-size: 12.5px;
    color: var(--text-2);
    min-height: 16px;
  }
  .status-msg.error { color: var(--danger); }
  .status-msg.success { color: #6ee7b7; }

  /* ---------- MAIN ---------- */
  .main {
    padding: 32px 36px;
  }

  .main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 26px;
    flex-wrap: wrap;
    gap: 14px;
  }

  .main-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
  }
  .main-count {
    color: var(--text-2);
    font-size: 13px;
    font-weight: 500;
  }

  .view-toggle {
    display: flex;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 3px;
    gap: 3px;
  }
  .view-toggle button {
    border: none;
    background: transparent;
    color: var(--text-2);
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .view-toggle button.active {
    background: var(--accent-grad);
    color: #17101f;
  }

  .search-input {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--text-0);
    font-size: 13px;
    min-width: 200px;
  }
  .search-input:focus { outline: none; border-color: var(--accent-1); }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-2);
  }
  .empty-state .glyph {
    font-family: var(--font-display);
    font-size: 44px;
    background: var(--accent-grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 6px;
  }

  /* Grid view */
  .items.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform .15s ease, border-color .15s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent-1); }
  .card .photo {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    background: var(--bg-0);
    display: block;
  }
  .card .photo.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
    font-family: var(--font-display);
    font-size: 30px;
  }
  .card-body { padding: 12px 14px; }
  .card-name { font-weight: 600; font-size: 14.5px; margin-bottom: 3px; }
  .card-link {
    font-size: 12px;
    color: var(--accent-1);
    text-decoration: none;
    word-break: break-all;
  }
  .card-link:hover { text-decoration: underline; }
  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .icon-btn {
    border: 1px solid var(--panel-border);
    background: var(--bg-0);
    color: var(--text-1);
    border-radius: 7px;
    padding: 5px 9px;
    font-size: 12px;
    cursor: pointer;
  }
  .icon-btn:hover { border-color: var(--accent-1); color: var(--text-0); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* List view */
  .items.list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .items.list .card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
  }
  .items.list .card .photo {
    width: 56px;
    height: 56px;
    aspect-ratio: unset;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .items.list .card-body {
    padding: 0;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .items.list .card-actions { margin-top: 0; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div>
      <div class="brand">Catálogo</div>
      <div class="brand-sub">lista pessoal privada</div>
    </div>

    <form id="itemForm">
      <input type="hidden" id="itemId" />

      <div class="field" style="margin-bottom:14px;">
        <span class="field-label">Nome</span>
        <input type="text" id="nomeInput" placeholder="Nome" required />
      </div>

      <div class="field" style="margin-bottom:14px;">
        <span class="field-label">Link</span>
        <input type="url" id="linkInput" placeholder="https://..." />
      </div>

      <div class="field" style="margin-bottom:14px;">
        <span class="field-label">Foto</span>
        <label class="upload-zone">
          <span id="uploadLabel">Clica ou arrasta uma imagem</span>
          <input type="file" id="fotoInput" accept="image/*" />
        </label>
        <img id="previewImg" class="upload-preview" />
      </div>

      <div class="status-msg" id="statusMsg"></div>

      <div class="form-actions" style="margin-top:6px;">
        <button type="submit" class="btn btn-primary" id="submitBtn">Adicionar</button>
        <button type="button" class="btn btn-ghost" id="cancelBtn" style="display:none;">Cancelar</button>
      </div>
    </form>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title">Os teus itens</div>
        <div class="main-count" id="itemCount">0 itens</div>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <input type="text" class="search-input" id="searchInput" placeholder="Procurar por nome..." />
        <div class="view-toggle">
          <button type="button" id="gridBtn" class="active">Grade</button>
          <button type="button" id="listBtn">Lista</button>
        </div>
      </div>
    </div>

    <div id="itemsContainer" class="items grid"></div>
  </main>
</div>

<script>
/* =========================================================
   CONFIGURAÇÃO — preenche estes dois valores antes de usar
   ========================================================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbx1hfhXNMWG0wSarNX1AinicPuqUh0dnLR7qPMXqEFafc5vOBfP97ACwcKGqFZkKWk/exec';
const IMGBB_API_KEY = '8b26d95c4f0f6159efda3d59e6843692';
/* ========================================================= */

let items = [];
let currentView = 'grid';
let editingId = null;

const form = document.getElementById('itemForm');
const nomeInput = document.getElementById('nomeInput');
const linkInput = document.getElementById('linkInput');
const fotoInput = document.getElementById('fotoInput');
const previewImg = document.getElementById('previewImg');
const uploadLabel = document.getElementById('uploadLabel');
const statusMsg = document.getElementById('statusMsg');
const submitBtn = document.getElementById('submitBtn');
const cancelBtn = document.getElementById('cancelBtn');
const itemsContainer = document.getElementById('itemsContainer');
const itemCount = document.getElementById('itemCount');
const searchInput = document.getElementById('searchInput');
const gridBtn = document.getElementById('gridBtn');
const listBtn = document.getElementById('listBtn');

let pendingPhotoUrl = '';

function setStatus(msg, type) {
  statusMsg.textContent = msg || '';
  statusMsg.className = 'status-msg' + (type ? ' ' + type : '');
}

/* ---------- Compressão + upload de imagem ---------- */
function compressImage(file, maxDim = 800, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if (width > height && width > maxDim) {
        height = Math.round(height * (maxDim / width));
        width = maxDim;
      } else if (height > maxDim) {
        width = Math.round(width * (maxDim / height));
        height = maxDim;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadToImgBB(base64DataUrl) {
  const base64 = base64DataUrl.split(',')[1];
  const body = new URLSearchParams();
  body.append('image', base64);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
    method: 'POST',
    body,
  });
  const data = await res.json();
  if (!data.success) throw new Error('Falha no upload para o ImgBB');
  return data.data.url;
}

fotoInput.addEventListener('change', async () => {
  const file = fotoInput.files[0];
  if (!file) return;
  try {
    setStatus('A comprimir e a enviar imagem...');
    const compressed = await compressImage(file);
    previewImg.src = compressed;
    previewImg.style.display = 'block';
    uploadLabel.textContent = 'Imagem selecionada ✓';
    const url = await uploadToImgBB(compressed);
    pendingPhotoUrl = url;
    setStatus('Imagem carregada com sucesso.', 'success');
  } catch (err) {
    setStatus('Erro ao carregar imagem: ' + err.message, 'error');
  }
});

/* ---------- API helpers (tudo via GET, evita CORS) ---------- */
async function apiCall(params) {
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v ?? ''));
  const res = await fetch(url.toString());
  return res.json();
}

async function loadItems() {
  setStatus('A carregar...');
  try {
    const data = await apiCall({ action: 'list' });
    if (!data.ok) throw new Error(data.error || 'Erro desconhecido');
    items = data.items || [];
    renderItems();
    setStatus('');
  } catch (err) {
    setStatus('Erro ao carregar dados: ' + err.message, 'error');
  }
}

/* ---------- Render ---------- */
function renderItems() {
  const query = searchInput.value.trim().toLowerCase();
  const filtered = items.filter((it) => it.nome.toLowerCase().includes(query));

  itemCount.textContent = `${filtered.length} ${filtered.length === 1 ? 'item' : 'itens'}`;
  itemsContainer.className = 'items ' + currentView;

  if (filtered.length === 0) {
    itemsContainer.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="glyph">✧</div>
        <div>Ainda não há itens. Adiciona o primeiro na barra lateral.</div>
      </div>`;
    return;
  }

  itemsContainer.innerHTML = filtered.map((it) => `
    <div class="card" data-id="${it.id}">
      ${it.foto
        ? `<img class="photo" src="${it.foto}" alt="${escapeHtml(it.nome)}" />`
        : `<div class="photo placeholder">✧</div>`}
      <div class="card-body">
        <div>
          <div class="card-name">${escapeHtml(it.nome)}</div>
          ${it.link ? `<a class="card-link" href="${escapeAttr(it.link)}" target="_blank" rel="noopener">${escapeHtml(it.link)}</a>` : ''}
        </div>
        <div class="card-actions">
          <button class="icon-btn edit-btn">Editar</button>
          <button class="icon-btn danger delete-btn">Apagar</button>
        </div>
      </div>
    </div>
  `).join('');

  itemsContainer.querySelectorAll('.edit-btn').forEach((btn) =>
    btn.addEventListener('click', (e) => startEdit(e.target.closest('.card').dataset.id))
  );
  itemsContainer.querySelectorAll('.delete-btn').forEach((btn) =>
    btn.addEventListener('click', (e) => deleteItem(e.target.closest('.card').dataset.id))
  );
}

function escapeHtml(str) {
  return (str || '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

/* ---------- Form: criar / editar ---------- */
function startEdit(id) {
  const it = items.find((i) => i.id === id);
  if (!it) return;
  editingId = id;
  nomeInput.value = it.nome;
  linkInput.value = it.link;
  pendingPhotoUrl = it.foto;
  previewImg.src = it.foto || '';
  previewImg.style.display = it.foto ? 'block' : 'none';
  uploadLabel.textContent = it.foto ? 'Imagem atual (escolhe outra para substituir)' : 'Clica ou arrasta uma imagem';
  submitBtn.textContent = 'Guardar alterações';
  cancelBtn.style.display = 'block';
  setStatus('');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  editingId = null;
  form.reset();
  pendingPhotoUrl = '';
  previewImg.src = '';
  previewImg.style.display = 'none';
  uploadLabel.textContent = 'Clica ou arrasta uma imagem';
  submitBtn.textContent = 'Adicionar';
  cancelBtn.style.display = 'none';
  setStatus('');
}

cancelBtn.addEventListener('click', resetForm);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const nome = nomeInput.value.trim();
  if (!nome) return;

  submitBtn.disabled = true;
  setStatus(editingId ? 'A guardar alterações...' : 'A adicionar...');

  try {
    if (editingId) {
      const data = await apiCall({
        action: 'update',
        id: editingId,
        nome,
        link: linkInput.value.trim(),
        foto: pendingPhotoUrl,
      });
      if (!data.ok) throw new Error(data.error);
      setStatus('Atualizado com sucesso.', 'success');
    } else {
      const data = await apiCall({
        action: 'create',
        nome,
        link: linkInput.value.trim(),
        foto: pendingPhotoUrl,
      });
      if (!data.ok) throw new Error(data.error);
      setStatus('Adicionado com sucesso.', 'success');
    }
    resetForm();
    await loadItems();
  } catch (err) {
    setStatus('Erro: ' + err.message, 'error');
  } finally {
    submitBtn.disabled = false;
  }
});

async function deleteItem(id) {
  if (!confirm('Tens a certeza que queres apagar este item?')) return;
  try {
    const data = await apiCall({ action: 'delete', id });
    if (!data.ok) throw new Error(data.error);
    await loadItems();
  } catch (err) {
    setStatus('Erro ao apagar: ' + err.message, 'error');
  }
}

/* ---------- Vista grade/lista + pesquisa ---------- */
gridBtn.addEventListener('click', () => { currentView = 'grid'; gridBtn.classList.add('active'); listBtn.classList.remove('active'); renderItems(); });
listBtn.addEventListener('click', () => { currentView = 'list'; listBtn.classList.add('active'); gridBtn.classList.remove('active'); renderItems(); });
searchInput.addEventListener('input', renderItems);

/* ---------- Init ---------- */
loadItems();
</script>
</body>
</html>
