<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F0E13;
    --surface: #1A1922;
    --surface2: #24222E;
    --border: #2E2B3C;
    --border-strong: #3E3A50;
    --text: #F0EEF5;
    --text-2: #A8A2BF;
    --text-3: #6B6580;
    --accent: #8B5CF6;
    --accent-bg: rgba(139,92,246,0.12);
    --accent2: #EC4899;
    --success: #34D399;
    --danger: #EF4444;
    --danger-bg: rgba(239,68,68,0.12);
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .topbar-title { font-size: 15px; font-weight: 600; }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .view-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-3);
    font-family: inherit;
    transition: all 0.15s;
  }
  .view-btn:hover { color: var(--text-2); border-color: var(--border-strong); }
  .view-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  .sync-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-3);
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  .sync-dot.syncing { background: #FBBF24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.25rem;
    gap: 1.25rem;
    min-height: calc(100vh - 52px);
  }

  .sidebar {
    width: 340px;
    flex-shrink: 0;
  }

  .main { flex: 1; min-width: 0; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    position: sticky;
    top: calc(52px + 1.25rem);
  }

  .form-section-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-3);
    margin-bottom: 12px;
  }
  .form-section-label.editing { color: var(--accent2); }

  .form-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .form-input {
    padding: 8px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--text);
    background: var(--surface2);
    font-family: inherit;
    width: 100%;
    transition: border-color 0.15s;
  }
  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
  }
  .form-input::placeholder { color: var(--text-3); }

  .photo-upload {
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
    position: relative;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
  }
  .photo-upload:hover { border-color: var(--accent); background: var(--accent-bg); }
  .photo-upload.has-photo { padding: 4px; }
  .photo-upload img {
    max-height: 140px;
    max-width: 100%;
    border-radius: 4px;
    object-fit: contain;
  }
  .photo-upload .upload-hint { font-size: 12px; color: var(--text-3); }
  .photo-upload .upload-hint-icon { font-size: 22px; }
  .photo-upload input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .photo-remove {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px; height: 22px;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .photo-upload.has-photo .photo-remove { display: flex; }

  .form-actions { display: flex; gap: 8px; margin-top: 12px; }

  .btn-primary {
    flex: 1;
    padding: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: filter 0.15s;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

  .btn-secondary {
    padding: 9px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--border); color: var(--text); }
  .btn-secondary.hidden { display: none; }

  /* ─────────── ITEMS ─────────── */

  .empty-state {
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 2rem;
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
  }
  .empty-state-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.5; }

  .items-count {
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  /* Grid view */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s;
  }
  .item-card:hover { transform: translateY(-2px); border-color: var(--accent); }

  .item-card .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }
  .item-card .card-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    color: var(--text-3);
    font-size: 28px;
  }

  .item-card .card-body {
    padding: 10px 12px 12px;
  }
  .item-card .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-card .card-link {
    display: block;
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-card .card-link:hover { text-decoration: underline; }

  .item-card .card-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .item-card .card-btn {
    flex: 1;
    padding: 4px;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    color: var(--text-2);
    font-family: inherit;
    transition: all 0.1s;
    text-align: center;
  }
  .item-card .card-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .item-card .card-btn.danger:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

  /* List view */
  .items-list { display: flex; flex-direction: column; gap: 8px; }

  .item-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s;
  }
  .item-row:hover { border-color: var(--border-strong); }

  .item-row .row-img {
    width: 48px;
    height: 48px;
    border-radius: var(--radius);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .item-row .row-img-placeholder {
    width: 48px;
    height: 48px;
    border-radius: var(--radius);
    flex-shrink: 0;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--text-3);
  }

  .item-row .row-body { flex: 1; min-width: 0; }
  .item-row .row-name { font-size: 14px; font-weight: 600; }
  .item-row .row-link {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-row .row-link:hover { text-decoration: underline; }

  .item-row .row-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .item-row .row-btn {
    padding: 4px 8px;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    color: var(--text-2);
    font-family: inherit;
    transition: all 0.1s;
  }
  .item-row .row-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .item-row .row-btn.danger:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1A1922;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 999;
    white-space: nowrap; max-width: 90vw;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 800px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; }
    .form-card { position: static; }
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">✦</div>
  <div class="topbar-title">Modelos</div>
  <div class="topbar-right">
    <button class="view-btn active" id="view-grid" onclick="setView('grid')">❐ Grade</button>
    <button class="view-btn" id="view-list" onclick="setView('list')">☰ Lista</button>
    <div class="sync-badge" id="sync-badge">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Planilha</span>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="form-card">
      <div class="form-section-label" id="form-section-label">✚ Novo modelo</div>

      <div class="form-field">
        <label class="form-label">Nome</label>
        <input class="form-input" id="f-nome" type="text" placeholder="Ex: Maria Silva">
      </div>

      <div class="form-field">
        <label class="form-label">Link</label>
        <input class="form-input" id="f-link" type="url" placeholder="https://...">
      </div>

      <div class="form-field">
        <label class="form-label">Foto</label>
        <div class="photo-upload" id="photo-upload">
          <input type="file" accept="image/*" id="f-foto-file" onchange="handlePhotoFile(event)">
          <div id="photo-placeholder">
            <div class="upload-hint-icon">🖼️</div>
            <div class="upload-hint">Clica para escolher foto</div>
          </div>
          <img id="photo-preview" style="display:none" alt="preview">
          <button class="photo-remove" id="photo-remove" onclick="removePhoto(event)">✕</button>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" id="btn-save" onclick="salvar()">
          <span id="btn-save-label">Adicionar</span>
        </button>
        <button class="btn-secondary hidden" id="btn-cancel" onclick="cancelarEdicao()">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="items-count" id="items-count"></div>
    <div id="items-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfvTiUgwewzok-WjTjqLgyJBgYxOdbh8g11qUzrbHhtZ6BuKBJ56zJhWMgjH9Lrj6_Mg/exec';

let items = [];
let editingId = null;
let photoBase64 = null;
let currentView = 'grid';

// ─────────────────────────────────────────────
// LISTA — CARREGAR
// ─────────────────────────────────────────────
async function carregar() {
  setSyncing(true);
  try {
    const resp = await fetch(`${SCRIPT_URL}?action=list&t=${Date.now()}`);
    const data = await resp.json();
    if (data.success && data.items) {
      items = data.items;
    } else {
      items = [];
    }
  } catch (e) {
    showToast('Erro ao carregar da planilha.');
    items = [];
  }
  render();
  setSyncing(false);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const container = document.getElementById('items-container');
  const count = document.getElementById('items-count');

  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✦</div><div>Nenhum modelo ainda.</div><div style="font-size:12px;margin-top:4px">Adiciona o primeiro pelo formulário ao lado.</div></div>`;
    count.textContent = '';
    return;
  }

  count.textContent = `${items.length} modelo${items.length !== 1 ? 's' : ''}`;

  if (currentView === 'grid') {
    container.className = 'items-grid';
    container.innerHTML = items.map(item => {
      const hasFoto = item.foto && item.foto !== '' && item.foto !== 'null';
      return `
        <div class="item-card">
          ${hasFoto
            ? `<img class="card-img" src="${item.foto}" alt="${item.nome}" loading="lazy">`
            : `<div class="card-img-placeholder">✦</div>`}
          <div class="card-body">
            <div class="card-name">${esc(item.nome)}</div>
            ${item.link ? `<a class="card-link" href="${esc(item.link)}" target="_blank" rel="noopener">${esc(item.link)}</a>` : ''}
            <div class="card-actions">
              <button class="card-btn" onclick="editar('${item.id}')">✏️ Editar</button>
              <button class="card-btn danger" onclick="apagar('${item.id}')">✕</button>
            </div>
          </div>
        </div>`;
    }).join('');
  } else {
    container.className = 'items-list';
    container.innerHTML = items.map(item => {
      const hasFoto = item.foto && item.foto !== '' && item.foto !== 'null';
      return `
        <div class="item-row">
          ${hasFoto
            ? `<img class="row-img" src="${item.foto}" alt="${item.nome}" loading="lazy">`
            : `<div class="row-img-placeholder">✦</div>`}
          <div class="row-body">
            <div class="row-name">${esc(item.nome)}</div>
            ${item.link ? `<a class="row-link" href="${esc(item.link)}" target="_blank" rel="noopener">${esc(item.link)}</a>` : ''}
          </div>
          <div class="row-actions">
            <button class="row-btn" onclick="editar('${item.id}')">✏️</button>
            <button class="row-btn danger" onclick="apagar('${item.id}')">✕</button>
          </div>
        </div>`;
    }).join('');
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─────────────────────────────────────────────
// VIEW TOGGLE
// ─────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('view-grid').className = 'view-btn' + (v==='grid'?' active':'');
  document.getElementById('view-list').className = 'view-btn' + (v==='list'?' active':'');
  render();
}

// ─────────────────────────────────────────────
// FOTO — UPLOAD + PREVIEW
// ─────────────────────────────────────────────
function handlePhotoFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Redimensionar para thumbnail antes de converter
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const maxW = 400;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.7);
      showPhotoPreview(photoBase64);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showPhotoPreview(src) {
  const preview = document.getElementById('photo-preview');
  const placeholder = document.getElementById('photo-placeholder');
  const upload = document.getElementById('photo-upload');
  preview.src = src;
  preview.style.display = 'block';
  placeholder.style.display = 'none';
  upload.classList.add('has-photo');
}

function removePhoto(e) {
  e.stopPropagation();
  photoBase64 = null;
  const preview = document.getElementById('photo-preview');
  const placeholder = document.getElementById('photo-placeholder');
  const upload = document.getElementById('photo-upload');
  preview.style.display = 'none';
  preview.src = '';
  placeholder.style.display = '';
  upload.classList.remove('has-photo');
  document.getElementById('f-foto-file').value = '';
}

// ─────────────────────────────────────────────
// SALVAR (criar ou editar)
// ─────────────────────────────────────────────
async function salvar() {
  const nome = document.getElementById('f-nome').value.trim();
  const link = document.getElementById('f-link').value.trim();

  if (!nome) { showToast('O nome é obrigatório.'); return; }

  document.getElementById('btn-save').disabled = true;
  setSyncing(true);

  try {
    const payload = {
      action: editingId ? 'edit' : 'create',
      nome,
      link,
      foto: photoBase64 || ''
    };
    if (editingId) payload.id = editingId;

    // POST para enviar base64 (pode ser grande)
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await resp.json();

    if (result.success) {
      showToast(editingId ? 'Actualizado!' : 'Adicionado!');
      limparForm();
      await carregar();
    } else {
      showToast('Erro: ' + (result.error || 'tenta novamente.'));
    }
  } catch (e) {
    showToast('Erro de ligação à planilha.');
  }

  document.getElementById('btn-save').disabled = false;
  setSyncing(false);
}

// ─────────────────────────────────────────────
// EDITAR
// ─────────────────────────────────────────────
function editar(id) {
  const item = items.find(i => String(i.id) === String(id));
  if (!item) { showToast('Item não encontrado.'); return; }

  editingId = item.id;
  document.getElementById('f-nome').value = item.nome || '';
  document.getElementById('f-link').value = item.link || '';

  if (item.foto && item.foto !== '' && item.foto !== 'null') {
    photoBase64 = item.foto;
    showPhotoPreview(item.foto);
  } else {
    removePhoto({ stopPropagation: () => {} });
  }

  document.getElementById('form-section-label').textContent = '✏️ Editar modelo';
  document.getElementById('form-section-label').classList.add('editing');
  document.getElementById('btn-save-label').textContent = 'Guardar';
  document.getElementById('btn-cancel').classList.remove('hidden');

  // Scroll ao formulário
  document.querySelector('.sidebar').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cancelarEdicao() {
  limparForm();
}

function limparForm() {
  editingId = null;
  document.getElementById('f-nome').value = '';
  document.getElementById('f-link').value = '';
  removePhoto({ stopPropagation: () => {} });
  document.getElementById('form-section-label').textContent = '✚ Novo modelo';
  document.getElementById('form-section-label').classList.remove('editing');
  document.getElementById('btn-save-label').textContent = 'Adicionar';
  document.getElementById('btn-cancel').classList.add('hidden');
}

// ─────────────────────────────────────────────
// APAGAR
// ─────────────────────────────────────────────
async function apagar(id) {
  if (!confirm('Remover este modelo?')) return;
  setSyncing(true);
  try {
    const resp = await fetch(`${SCRIPT_URL}?action=delete&id=${encodeURIComponent(id)}&t=${Date.now()}`);
    const result = await resp.json();
    if (result.success) {
      showToast('Removido.');
      if (String(editingId) === String(id)) limparForm();
      await carregar();
    } else {
      showToast('Erro ao remover.');
    }
  } catch (e) {
    showToast('Erro ao remover.');
  }
  setSyncing(false);
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function setSyncing(s) {
  document.getElementById('sync-dot').className = 'sync-dot' + (s ? ' syncing' : '');
  document.getElementById('sync-label').textContent = s ? 'A sincronizar...' : 'Planilha';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
